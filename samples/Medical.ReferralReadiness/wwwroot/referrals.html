<!doctype html><html><head><meta charset="utf-8"><title>Referral Readiness</title><style>body{font-family:Segoe UI,Arial;margin:2rem}table{border-collapse:collapse}td,th{border:1px solid #ccc;padding:.5rem}a.button{background:#2457c5;color:white;padding:.35rem .6rem;text-decoration:none;border-radius:4px}</style></head><body><h1>Referral Readiness Assistant</h1><p>All records are synthetic. Administrative review only.</p><table id="referrals"><thead><tr><th>Referral</th><th>Service line</th><th>Status</th><th>Assistant</th></tr></thead><tbody></tbody></table><p><a href="/_agentkit">Open Agent Kit inspector</a></p><script>fetch('/referrals').then(r=>r.json()).then(rows=>{const body=document.querySelector('tbody');for(const r of rows){const ready=r.hasSignedOrder&&r.hasInsuranceAuthorization&&r.hasClinicalSummary&&r.hasRelevantImaging;body.insertAdjacentHTML('beforeend',`<tr><td>${r.referralId}</td><td>${r.serviceLine}</td><td>${ready?'appears complete':'needs review'}</td><td><a class="button" href="/_agentkit?prompt=${encodeURIComponent('Review referral '+r.referralId)}">Review with assistant</a></td></tr>`);}});</script></body></html>
