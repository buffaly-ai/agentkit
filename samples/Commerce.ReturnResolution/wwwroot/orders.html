<!doctype html><html><head><meta charset="utf-8"><title>Return Resolution</title><style>body{font-family:Segoe UI,Arial;margin:2rem}.pending{color:#9a6500}.approved{color:green}.agent{font-weight:bold}</style></head><body><h1>Return Resolution Assistant</h1><p>Synthetic commerce workflow. Agent can create a proposal only; approval is a normal app endpoint.</p><h2>Orders</h2><table id="orders" border="1" cellpadding="6"></table><h2>Refund proposals</h2><div id="proposals"></div><p><a href="/_agentkit">Open embedded Agent Kit inspector</a></p><script>async function load(){const orders=await fetch('/orders').then(r=>r.json());document.querySelector('#orders').innerHTML='<tr><th>Order</th><th>Reason</th><th>Amount</th><th>Assistant</th></tr>'+orders.map(o=>`<tr><td>${o.orderId}</td><td>${o.reason}</td><td>${o.merchandiseAmount}</td><td><a href="/_agentkit?prompt=${encodeURIComponent('Review order '+o.orderId)}">Review</a></td></tr>`).join('');const ps=await fetch('/api/refund-proposals').then(r=>r.json());document.querySelector('#proposals').innerHTML=ps.map(p=>`<div><span class="agent">Agent recommendation</span> ${p.proposalId} ${p.orderId} $${p.amount} <span class="${p.status==='approved'?'approved':'pending'}">${p.status}</span> <button onclick="fetch('/api/refund-proposals/${p.proposalId}/approve',{method:'POST'}).then(load)">Approve</button></div>`).join('')||'No proposals yet.';}load();</script></body></html>
